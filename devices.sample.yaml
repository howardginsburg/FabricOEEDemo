simulator:
  connectionDelayMs: 100

  brokers:
    manufacturing-eventhub:
      type: EventHub
      connection: "<YOUR_EVENTHUB_CONNECTION_STRING>"
      # hub omitted — EntityPath in the connection string is used automatically

  # ---------------------------------------------------------------------------
  # OEE Telemetry Profiles
  #
  # Each profile represents a distinct machine type with realistic parameters:
  #   event_type        Static — 'machine_telemetry' (used for Eventstream routing)
  #   machine_status    Cycle weighted to reflect expected fault/idle frequency
  #   actual_cycle_time Random — varies around ideal; wider range = lower performance
  #   total_parts       Cumulative counter (Increment)
  #   rejected_parts    Random — higher range = lower quality score
  #   line_id           Static — fixed production line assignment
  #   timestamp         Timestamp
  #
  # Fields NOT in telemetry — enriched/derived inside Fabric:
  #   ideal_cycle_time  Stored in MachineMaster reference table (per machine_type)
  #   shift             Derived from timestamp (Day = 06:00–18:00, Night = 18:00–06:00)
  #
  # OEE = Availability × Performance × Quality
  #   Availability  = Running messages / total messages
  #   Performance   = ideal_cycle_time / avg(actual_cycle_time)  [when Running]
  #   Quality       = 1 - (sum(rejected_parts) / sum(total_parts))
  # ---------------------------------------------------------------------------
  profiles:

    # CNC Mill — slow, precise, low fault rate, near-zero rejects
    # Expected OEE ~88%: high availability, good performance, excellent quality
    # MachineMaster: ideal_cycle_time=45s
    cnc_mill:
      event_type:       { gen: Static, value: machine_telemetry }
      machine_type:     { gen: Static, value: CNC-Mill }
      machine_status:   { gen: Cycle, values: [Running, Running, Running, Running, Running, Idle, Running, Running, Running, Fault] }
      actual_cycle_time: { gen: Random, min: 45, max: 52 }
      total_parts:      { gen: Increment, init: 0, step: 1, min: 0, max: 999999 }
      rejected_parts:   { gen: Random, min: 0, max: 1 }
      line_id:          { gen: Static, value: Line-A }
      timestamp:        { gen: Timestamp }

    # Hydraulic Press — fast cycle, elevated fault rate, moderate rejects
    # Expected OEE ~45%: poor performance (actual >> ideal), frequent faults
    # MachineMaster: ideal_cycle_time=8s
    hydraulic_press:
      event_type:       { gen: Static, value: machine_telemetry }
      machine_type:     { gen: Static, value: Hydraulic-Press }
      machine_status:   { gen: Cycle, values: [Running, Running, Running, Fault, Running, Running, Idle, Fault] }
      actual_cycle_time: { gen: Random, min: 10, max: 18 }
      total_parts:      { gen: Increment, init: 0, step: 8, min: 0, max: 999999 }
      rejected_parts:   { gen: Random, min: 0, max: 3 }
      line_id:          { gen: Static, value: Line-A }
      timestamp:        { gen: Timestamp }

    # Assembly Robot — medium speed, highly reliable, near-zero rejects
    # Expected OEE ~92%: star performer
    # MachineMaster: ideal_cycle_time=20s
    assembly_robot:
      event_type:       { gen: Static, value: machine_telemetry }
      machine_type:     { gen: Static, value: Assembly-Robot }
      machine_status:   { gen: Cycle, values: [Running, Running, Running, Running, Running, Running, Running, Idle] }
      actual_cycle_time: { gen: Random, min: 20, max: 23 }
      total_parts:      { gen: Increment, init: 0, step: 4, min: 0, max: 999999 }
      rejected_parts:   { gen: Random, min: 0, max: 1 }
      line_id:          { gen: Static, value: Line-B }
      timestamp:        { gen: Timestamp }

    # Packaging Line — very fast, frequent idle stoppages, moderate rejects
    # Expected OEE ~55%: availability drag from idle, quality drag from volume
    # MachineMaster: ideal_cycle_time=3s
    packaging_line:
      event_type:       { gen: Static, value: machine_telemetry }
      machine_type:     { gen: Static, value: Packaging-Line }
      machine_status:   { gen: Cycle, values: [Running, Running, Idle, Running, Running, Running, Idle, Idle, Running, Fault] }
      actual_cycle_time: { gen: Random, min: 3, max: 6 }
      total_parts:      { gen: Increment, init: 0, step: 20, min: 0, max: 999999 }
      rejected_parts:   { gen: Random, min: 0, max: 4 }
      line_id:          { gen: Static, value: Line-B }
      timestamp:        { gen: Timestamp }

  # ---------------------------------------------------------------------------
  # Maintenance Event Profiles
  #
  # Simulates a Computerized Maintenance Management System (CMMS) feed.
  # These events travel through the SAME Eventstream as machine telemetry and
  # are routed to the MaintenanceEvents KQL table using event_type filtering.
  #
  #   event_type        Static — 'maintenance_event' (Eventstream routing key)
  #   machine_type      Static — matches the machine type being maintained
  #   line_id           Static — production line
  #   technician_id     Static — assigned technician
  #   issue_type        Cycle  — machine-specific fault category
  #   action            Cycle  — exactly Acknowledged → InProgress → Resolved per incident
  #   timestamp         Timestamp
  #
  # Synchronization: both issue_type and action have the same cycle length.
  # issue_type repeats each value 3× so the same issue spans all 3 lifecycle stages.
  # After Resolved, the next Acknowledged begins a new incident with a new issue type.
  # ---------------------------------------------------------------------------

    # CNC Mill maintenance — infrequent, T001, Line-A
    # Issues: Tool-Wear, Spindle-Vibration, Coolant-Leak (each spans one full A→IP→R lifecycle)
    maintenance_cnc:
      event_type:       { gen: Static, value: maintenance_event }
      machine_type:     { gen: Static, value: CNC-Mill }
      line_id:          { gen: Static, value: Line-A }
      technician_id:    { gen: Static, value: T001 }
      issue_type:       { gen: Cycle, values: [Tool-Wear, Tool-Wear, Tool-Wear, Spindle-Vibration, Spindle-Vibration, Spindle-Vibration, Coolant-Leak, Coolant-Leak, Coolant-Leak] }
      action:           { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:        { gen: Timestamp }

    # Hydraulic Press maintenance — frequent faults, T002, Line-A
    # Issues: Pressure-Loss, Seal-Failure, Valve-Fault
    maintenance_press:
      event_type:       { gen: Static, value: maintenance_event }
      machine_type:     { gen: Static, value: Hydraulic-Press }
      line_id:          { gen: Static, value: Line-A }
      technician_id:    { gen: Static, value: T002 }
      issue_type:       { gen: Cycle, values: [Pressure-Loss, Pressure-Loss, Pressure-Loss, Seal-Failure, Seal-Failure, Seal-Failure, Valve-Fault, Valve-Fault, Valve-Fault] }
      action:           { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:        { gen: Timestamp }

    # Assembly Robot maintenance — very reliable, T003, Line-B
    # Issues: Joint-Calibration, Gripper-Failure, Encoder-Fault
    maintenance_robot:
      event_type:       { gen: Static, value: maintenance_event }
      machine_type:     { gen: Static, value: Assembly-Robot }
      line_id:          { gen: Static, value: Line-B }
      technician_id:    { gen: Static, value: T003 }
      issue_type:       { gen: Cycle, values: [Joint-Calibration, Joint-Calibration, Joint-Calibration, Gripper-Failure, Gripper-Failure, Gripper-Failure, Encoder-Fault, Encoder-Fault, Encoder-Fault] }
      action:           { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:        { gen: Timestamp }

    # Packaging Line maintenance — frequent idle faults, T004, Line-B
    # Issues: Conveyor-Jam, Seal-Bar-Temp, Film-Feed-Error
    maintenance_packaging:
      event_type:       { gen: Static, value: maintenance_event }
      machine_type:     { gen: Static, value: Packaging-Line }
      line_id:          { gen: Static, value: Line-B }
      technician_id:    { gen: Static, value: T004 }
      issue_type:       { gen: Cycle, values: [Conveyor-Jam, Conveyor-Jam, Conveyor-Jam, Seal-Bar-Temp, Seal-Bar-Temp, Seal-Bar-Temp, Film-Feed-Error, Film-Feed-Error, Film-Feed-Error] }
      action:           { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:        { gen: Timestamp }

  # ---------------------------------------------------------------------------
  # Devices — Line-A: 3× CNC Mill, 2× Hydraulic Press
  #           Line-B: 3× Assembly Robot, 2× Packaging Line
  # Maintenance — 1× technician feed per machine type (4 devices)
  # All 14 devices share the single manufacturing-eventhub broker.
  # Eventstream routes to MachineEvents or MaintenanceEvents by event_type.
  # ---------------------------------------------------------------------------
  devices:

    # --- Line-A: CNC Mills (slow precision machines — report every 30s) ---
    - id: cnc-mill-001
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    - id: cnc-mill-002
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    - id: cnc-mill-003
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    # --- Line-A: Hydraulic Presses (fast cycle, frequent faults — report every 10s) ---
    - id: press-001
      interval: 10s
      profile: hydraulic_press
      broker: { name: manufacturing-eventhub }

    - id: press-002
      interval: 10s
      profile: hydraulic_press
      broker: { name: manufacturing-eventhub }

    # --- Line-B: Assembly Robots (medium speed, reliable — report every 15s) ---
    - id: robot-001
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    - id: robot-002
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    - id: robot-003
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    # --- Line-B: Packaging Lines (very fast, high volume — report every 5s) ---
    - id: packaging-001
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    - id: packaging-002
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    # --- Maintenance CMMS Feed (one technician per machine type, report every 2–3 min) ---
    - id: maint-cnc-line-a
      interval: 120s-240s            # CNC faults are infrequent; 2–4 min between updates
      profile: maintenance_cnc
      broker: { name: manufacturing-eventhub }

    - id: maint-press-line-a
      interval: 60s-150s             # Press faults surface quickly; 1–2.5 min
      profile: maintenance_press
      broker: { name: manufacturing-eventhub }

    - id: maint-robot-line-b
      interval: 150s-330s            # Robots are reliable; slower lifecycle 2.5–5.5 min
      profile: maintenance_robot
      broker: { name: manufacturing-eventhub }

    - id: maint-pkg-line-b
      interval: 45s-135s             # Packaging jams happen fast; 0.75–2.25 min
      profile: maintenance_packaging
      broker: { name: manufacturing-eventhub }
