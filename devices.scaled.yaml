simulator:
  connectionDelayMs: 100

  brokers:
    manufacturing-eventhub:
      type: EventHub
      connection: "<YOUR_EVENTHUB_CONNECTION_STRING>"

  # ---------------------------------------------------------------------------
  # SCALED OEE Telemetry Profiles
  #
  # 8 machine types across 4 production lines (A–D):
  #   Line-A  Machining    — CNC-Mill, Hydraulic-Press, Laser-Cutter
  #   Line-B  Assembly     — Assembly-Robot, Welding-Robot
  #   Line-C  Finishing    — Paint-Booth, Heat-Treat-Oven
  #   Line-D  Packaging    — Packaging-Line
  #
  # 36 telemetry devices + 8 maintenance feeds = 44 total devices
  # ---------------------------------------------------------------------------
  profiles:

    # ═══════════════════════════════════════════════════════════════════════════
    # LINE-A : MACHINING
    # ═══════════════════════════════════════════════════════════════════════════

    # CNC Mill — slow, precise, low fault rate, near-zero rejects
    # Expected OEE ~88%  |  MachineMaster: ideal_cycle_time=45s
    cnc_mill:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: CNC-Mill }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Running, Running, Idle, Running, Running, Running, Fault] }
      actual_cycle_time: { gen: Random, min: 45, max: 52 }
      total_parts:       { gen: Increment, init: 0, step: 1, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 1 }
      line_id:           { gen: Static, value: Line-A }
      timestamp:         { gen: Timestamp }

    # Hydraulic Press — fast cycle, elevated fault rate, moderate rejects
    # Expected OEE ~45%  |  MachineMaster: ideal_cycle_time=8s
    hydraulic_press:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Hydraulic-Press }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Fault, Running, Running, Idle, Fault] }
      actual_cycle_time: { gen: Random, min: 10, max: 18 }
      total_parts:       { gen: Increment, init: 0, step: 8, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 3 }
      line_id:           { gen: Static, value: Line-A }
      timestamp:         { gen: Timestamp }

    # Laser Cutter — fast precision cutting, occasional overheats
    # Expected OEE ~75%  |  MachineMaster: ideal_cycle_time=12s
    laser_cutter:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Laser-Cutter }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Running, Idle, Running, Running, Fault, Running, Running] }
      actual_cycle_time: { gen: Random, min: 12, max: 17 }
      total_parts:       { gen: Increment, init: 0, step: 2, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 2 }
      line_id:           { gen: Static, value: Line-A }
      timestamp:         { gen: Timestamp }

    # ═══════════════════════════════════════════════════════════════════════════
    # LINE-B : ASSEMBLY
    # ═══════════════════════════════════════════════════════════════════════════

    # Assembly Robot — medium speed, highly reliable, near-zero rejects
    # Expected OEE ~92%  |  MachineMaster: ideal_cycle_time=20s
    assembly_robot:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Assembly-Robot }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Running, Running, Running, Running, Idle] }
      actual_cycle_time: { gen: Random, min: 20, max: 23 }
      total_parts:       { gen: Increment, init: 0, step: 4, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 1 }
      line_id:           { gen: Static, value: Line-B }
      timestamp:         { gen: Timestamp }

    # Welding Robot — medium-fast, occasional spatter rejects
    # Expected OEE ~70%  |  MachineMaster: ideal_cycle_time=15s
    welding_robot:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Welding-Robot }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Fault, Running, Running, Idle, Running, Running, Running] }
      actual_cycle_time: { gen: Random, min: 15, max: 22 }
      total_parts:       { gen: Increment, init: 0, step: 3, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 2 }
      line_id:           { gen: Static, value: Line-B }
      timestamp:         { gen: Timestamp }

    # ═══════════════════════════════════════════════════════════════════════════
    # LINE-C : FINISHING
    # ═══════════════════════════════════════════════════════════════════════════

    # Paint Booth — batch process, slow cycle, quality-sensitive
    # Expected OEE ~65%  |  MachineMaster: ideal_cycle_time=60s
    paint_booth:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Paint-Booth }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Idle, Idle, Running, Running, Fault, Running, Running] }
      actual_cycle_time: { gen: Random, min: 60, max: 85 }
      total_parts:       { gen: Increment, init: 0, step: 6, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 3 }
      line_id:           { gen: Static, value: Line-C }
      timestamp:         { gen: Timestamp }

    # Heat-Treat Oven — very slow batch, high reliability, rare rejects
    # Expected OEE ~80%  |  MachineMaster: ideal_cycle_time=120s
    heat_treat_oven:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Heat-Treat-Oven }
      machine_status:    { gen: Cycle, values: [Running, Running, Running, Running, Running, Running, Idle, Running, Running, Running] }
      actual_cycle_time: { gen: Random, min: 120, max: 145 }
      total_parts:       { gen: Increment, init: 0, step: 10, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 1 }
      line_id:           { gen: Static, value: Line-C }
      timestamp:         { gen: Timestamp }

    # ═══════════════════════════════════════════════════════════════════════════
    # LINE-D : PACKAGING
    # ═══════════════════════════════════════════════════════════════════════════

    # Packaging Line — very fast, frequent idle stoppages, moderate rejects
    # Expected OEE ~55%  |  MachineMaster: ideal_cycle_time=3s
    packaging_line:
      event_type:        { gen: Static, value: machine_telemetry }
      machine_type:      { gen: Static, value: Packaging-Line }
      machine_status:    { gen: Cycle, values: [Running, Running, Idle, Running, Running, Running, Idle, Idle, Running, Fault] }
      actual_cycle_time: { gen: Random, min: 3, max: 6 }
      total_parts:       { gen: Increment, init: 0, step: 20, min: 0, max: 999999 }
      rejected_parts:    { gen: Random, min: 0, max: 4 }
      line_id:           { gen: Static, value: Line-D }
      timestamp:         { gen: Timestamp }

  # ---------------------------------------------------------------------------
  # Maintenance Event Profiles (one per machine type)
  # ---------------------------------------------------------------------------

    maintenance_cnc:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: CNC-Mill }
      line_id:           { gen: Static, value: Line-A }
      technician_id:     { gen: Static, value: T001 }
      issue_type:        { gen: Cycle, values: [Tool-Wear, Tool-Wear, Tool-Wear, Spindle-Vibration, Spindle-Vibration, Spindle-Vibration, Coolant-Leak, Coolant-Leak, Coolant-Leak] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_press:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Hydraulic-Press }
      line_id:           { gen: Static, value: Line-A }
      technician_id:     { gen: Static, value: T002 }
      issue_type:        { gen: Cycle, values: [Pressure-Loss, Pressure-Loss, Pressure-Loss, Seal-Failure, Seal-Failure, Seal-Failure, Valve-Fault, Valve-Fault, Valve-Fault] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_laser:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Laser-Cutter }
      line_id:           { gen: Static, value: Line-A }
      technician_id:     { gen: Static, value: T005 }
      issue_type:        { gen: Cycle, values: [Lens-Contamination, Lens-Contamination, Lens-Contamination, Gas-Pressure-Low, Gas-Pressure-Low, Gas-Pressure-Low, Beam-Misalignment, Beam-Misalignment, Beam-Misalignment] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_robot:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Assembly-Robot }
      line_id:           { gen: Static, value: Line-B }
      technician_id:     { gen: Static, value: T003 }
      issue_type:        { gen: Cycle, values: [Joint-Calibration, Joint-Calibration, Joint-Calibration, Gripper-Failure, Gripper-Failure, Gripper-Failure, Encoder-Fault, Encoder-Fault, Encoder-Fault] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_welder:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Welding-Robot }
      line_id:           { gen: Static, value: Line-B }
      technician_id:     { gen: Static, value: T006 }
      issue_type:        { gen: Cycle, values: [Wire-Feed-Jam, Wire-Feed-Jam, Wire-Feed-Jam, Tip-Wear, Tip-Wear, Tip-Wear, Gas-Flow-Low, Gas-Flow-Low, Gas-Flow-Low] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_paint:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Paint-Booth }
      line_id:           { gen: Static, value: Line-C }
      technician_id:     { gen: Static, value: T007 }
      issue_type:        { gen: Cycle, values: [Nozzle-Clog, Nozzle-Clog, Nozzle-Clog, Air-Filter-Saturated, Air-Filter-Saturated, Air-Filter-Saturated, Paint-Viscosity-Drift, Paint-Viscosity-Drift, Paint-Viscosity-Drift] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_oven:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Heat-Treat-Oven }
      line_id:           { gen: Static, value: Line-C }
      technician_id:     { gen: Static, value: T008 }
      issue_type:        { gen: Cycle, values: [Thermocouple-Drift, Thermocouple-Drift, Thermocouple-Drift, Door-Seal-Worn, Door-Seal-Worn, Door-Seal-Worn, Element-Burnout, Element-Burnout, Element-Burnout] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

    maintenance_packaging:
      event_type:        { gen: Static, value: maintenance_event }
      machine_type:      { gen: Static, value: Packaging-Line }
      line_id:           { gen: Static, value: Line-D }
      technician_id:     { gen: Static, value: T004 }
      issue_type:        { gen: Cycle, values: [Conveyor-Jam, Conveyor-Jam, Conveyor-Jam, Seal-Bar-Temp, Seal-Bar-Temp, Seal-Bar-Temp, Film-Feed-Error, Film-Feed-Error, Film-Feed-Error] }
      action:            { gen: Cycle, values: [Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved, Acknowledged, InProgress, Resolved] }
      timestamp:         { gen: Timestamp }

  # ---------------------------------------------------------------------------
  # Devices — 44 total
  #   Line-A  Machining:  4× CNC-Mill, 3× Hydraulic-Press, 2× Laser-Cutter
  #   Line-B  Assembly:   4× Assembly-Robot, 3× Welding-Robot
  #   Line-C  Finishing:  2× Paint-Booth, 2× Heat-Treat-Oven
  #   Line-D  Packaging:  4× Packaging-Line
  #   Maintenance:        8× CMMS feeds (one per machine type)
  #
  # 36 telemetry + 8 maintenance = 44 devices total
  # ---------------------------------------------------------------------------
  devices:

    # ═══════════ LINE-A : MACHINING ═══════════

    # CNC Mills (report every 30s)
    - id: cnc-mill-001
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    - id: cnc-mill-002
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    - id: cnc-mill-003
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    - id: cnc-mill-004
      interval: 30s
      profile: cnc_mill
      broker: { name: manufacturing-eventhub }

    # Hydraulic Presses (report every 10s)
    - id: press-001
      interval: 10s
      profile: hydraulic_press
      broker: { name: manufacturing-eventhub }

    - id: press-002
      interval: 10s
      profile: hydraulic_press
      broker: { name: manufacturing-eventhub }

    - id: press-003
      interval: 10s
      profile: hydraulic_press
      broker: { name: manufacturing-eventhub }

    # Laser Cutters (report every 12s)
    - id: laser-001
      interval: 12s
      profile: laser_cutter
      broker: { name: manufacturing-eventhub }

    - id: laser-002
      interval: 12s
      profile: laser_cutter
      broker: { name: manufacturing-eventhub }

    # ═══════════ LINE-B : ASSEMBLY ═══════════

    # Assembly Robots (report every 15s)
    - id: robot-001
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    - id: robot-002
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    - id: robot-003
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    - id: robot-004
      interval: 15s
      profile: assembly_robot
      broker: { name: manufacturing-eventhub }

    # Welding Robots (report every 12s)
    - id: welder-001
      interval: 12s
      profile: welding_robot
      broker: { name: manufacturing-eventhub }

    - id: welder-002
      interval: 12s
      profile: welding_robot
      broker: { name: manufacturing-eventhub }

    - id: welder-003
      interval: 12s
      profile: welding_robot
      broker: { name: manufacturing-eventhub }

    # ═══════════ LINE-C : FINISHING ═══════════

    # Paint Booths (report every 45s — slow batch)
    - id: paint-001
      interval: 45s
      profile: paint_booth
      broker: { name: manufacturing-eventhub }

    - id: paint-002
      interval: 45s
      profile: paint_booth
      broker: { name: manufacturing-eventhub }

    # Heat-Treat Ovens (report every 90s — very slow batch)
    - id: oven-001
      interval: 90s
      profile: heat_treat_oven
      broker: { name: manufacturing-eventhub }

    - id: oven-002
      interval: 90s
      profile: heat_treat_oven
      broker: { name: manufacturing-eventhub }

    # ═══════════ LINE-D : PACKAGING ═══════════

    # Packaging Lines (report every 5s — high volume)
    - id: packaging-001
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    - id: packaging-002
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    - id: packaging-003
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    - id: packaging-004
      interval: 5s
      profile: packaging_line
      broker: { name: manufacturing-eventhub }

    # ═══════════ MAINTENANCE CMMS FEEDS ═══════════

    - id: maint-cnc-line-a
      interval: 120s-240s
      profile: maintenance_cnc
      broker: { name: manufacturing-eventhub }

    - id: maint-press-line-a
      interval: 60s-150s
      profile: maintenance_press
      broker: { name: manufacturing-eventhub }

    - id: maint-laser-line-a
      interval: 90s-200s
      profile: maintenance_laser
      broker: { name: manufacturing-eventhub }

    - id: maint-robot-line-b
      interval: 150s-330s
      profile: maintenance_robot
      broker: { name: manufacturing-eventhub }

    - id: maint-welder-line-b
      interval: 80s-180s
      profile: maintenance_welder
      broker: { name: manufacturing-eventhub }

    - id: maint-paint-line-c
      interval: 100s-250s
      profile: maintenance_paint
      broker: { name: manufacturing-eventhub }

    - id: maint-oven-line-c
      interval: 200s-400s
      profile: maintenance_oven
      broker: { name: manufacturing-eventhub }

    - id: maint-pkg-line-d
      interval: 45s-135s
      profile: maintenance_packaging
      broker: { name: manufacturing-eventhub }
